    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Isn't this just another todo app?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Zen combines the Eisenhower Matrix, Pomodoro timer, time tracking, and an auto-generated standup in one developer-focused flow. It's the Plan → Decide → Work → Standup loop as a product — not a flat list of checkboxes."
            }
          },
          {
            "@type": "Question",
            "name": "Is Zen free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — core features are free. A Pro tier with advanced integrations and team sharing is planned."
            }
          },
          {
            "@type": "Question",
            "name": "Can I use Zen with my team?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Zen is built for individual developers. For team collaboration, we recommend Sunday (our team-oriented sibling product) or Linear."
            }
          },
          {
            "@type": "Question",
            "name": "What happens to my data?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Your data lives in your Firebase account. You can export everything (tasks, tracks) as CSV at any time, and delete your account from Settings."
            }
          },
          {
            "@type": "Question",
            "name": "Is Zen open source?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — MIT licensed at github.com/jesusantguerrero/zen."
            }
          },
          {
            "@type": "Question",
            "name": "Can I use Zen without Jira?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, Zen works fully standalone. Jira, GitHub, and Google integrations are optional — add them if you want two-way issue import and timesheet sync."
            }
          }
        ]
      }
    </script>
